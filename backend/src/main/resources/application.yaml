spring:
  application:
    name: backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/qingxunhuan?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 上传文件存储路径
upload:
  path: ./uploads

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: qingxunhuan2026qingyaSecretKeyForJWTTokenGeneration
  expiration: 604800000  # 7天(毫秒)

# 微信小程序配置(开发时留空使用模拟模式)
wechat:
  appid:
  secret:
